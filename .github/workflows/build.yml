name: Build and Test

on:
  push:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository files
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: add rights
        run: chmod +x gradlew && ./gradlew build
      - name: Build with Gradle
        run: ./gradlew build
      - name: Run tests
        run: gradle test

